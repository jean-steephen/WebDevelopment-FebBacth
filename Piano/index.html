<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: sans-serif;
            text-align: center;
        }

        p{
            font-size: 24px;
        }

        .piano{
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .key{
            width: 60px;
            height: 200px;
            background-color: white;
            margin: 2px;
            border: 1px solid black;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s;
        }

        .key:active{
            background-color: #add;
        }
    </style>
</head>
<body>
    <h1>Piano - Event Topic </h1>
    <p> <strong>Note:</strong>  Click or Hover To Play a Note</p>

    <div class="piano">
     
        <!-- data-note is an attribute which stores data of a Tag -->
        <div class="key" data-note="C">Cat</div>

        <div class="key" data-note="D">D</div>
        <div class="key" data-note="E">E</div>
        <div class="key" data-note="F">F</div>
        <div class="key" data-note="G">G</div>
        <div class="key" data-note="A">A</div>
        <div class="key" data-note="B">B</div>

    </div>

    <audio id="audio-C" src="/music/u_c58whxla22-middle-c-piano-c4-422087.mp3"></audio>
    <audio id="audio-D" src="/music/u_c58whxla22-d-piano-d4-422091.mp3"></audio>
    <audio id="audio-E" src="/music/u_c58whxla22-e-piano-e4-422092.mp3"></audio>
    <audio id="audio-F" src="/music/u_c58whxla22-f-piano-f4-422101.mp3"></audio>
    <audio id="audio-G" src="/music/u_c58whxla22-g-piano-g4-422102.mp3"></audio>
    <audio id="audio-A" src="/music/u_c58whxla22-a-piano-a4-422104.mp3"></audio>
    <audio id="audio-B" src="/music/u_c58whxla22-b-piano-b4-422106.mp3"></audio>


    <script>
          const keys = document.querySelectorAll('.key')

          //keys is and array - in which we 7 div containers
         
          keys.forEach( function(key){

             const note = key.getAttribute("data-note")

             const audio = document.getElementById("audio-"+note)

             
            //Events
            key.addEventListener('click' , function(){
                audio.currentTime = 0
                audio.play()
            })



            //Mouse 
            key.addEventListener('mouseover', function(){
                key.style.backgroundColor = "lightblue"
            })

              key.addEventListener('mouseout', function(){
                key.style.backgroundColor = "white"
            })
          })

         
    </script>
</body>
</html>
