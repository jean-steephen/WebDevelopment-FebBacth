<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 id="abc">Hello Javascript</h2>

    <h2>Hello GUys</h2>

    <h2>Hello This is iNDEX no 2</h2>

    <div class="myclass">This is Div - 0</div>
    <div class="myclass">This is Div - 1</div>

    <div class="hello">This is Div </div>


   <div class="box">
    Hello
   </div>
   <div class="box">
    HOw are you?
   </div>

    <script>
        //Task : Select HTML Tags(Elements) in JS

        //1. getElementById("Id Name") : It selects the HTML Tag which has Id in js
        //document - webpage

        const ele =  document.getElementById("abc")
        console.log(ele)

        //2. getElementByClassName("Class Name")
              
        const ele1 =  document.getElementsByClassName("myclass")
        console.log(ele1)
        console.log(ele1[1])

        //3. Tag Name

        const ele2 =   document.getElementsByTagName("h2")
        console.log(ele2)
        console.log(ele2[2])

        // 4 . querySelectors - It Follows the CSS selectors - #IdName , .className , TagNAme
               // It only Selects Single HTML Tag/Element - First one

        const xyz =  document.querySelector(".box")
        console.log(xyz)

        // querySelectorall - Multiple Tag
        
        const abc = document.querySelectorAll(".box")
        console.log(abc)


    </script>
</body>
</html>
