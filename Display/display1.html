<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color:red;
            font-size: 25px;
            font-family:cursive;  
        }
        p.ex1{
            display:none;
        }
        p.ex2{
            display:block;
            background-color: aqua;
        }
        p.ex3{
            display:inline;
            color:orange;
        }
    </style>
</head>
<body>
    <h2>Display properties Example</h2>
    <h1>Display None</h1>
    <div>
        Here the function is disabled as none.
        <p class="ex1">Hello Display none</p>
    </div>
    <h1>Display Block</h1>
    <div>
        Act like div container -100% space or widtth
        <p class="ex2">Hello Display Block</p>
    </div>
    <h1>Display Inline</h1>
    <div>
        Act like a Span Tag - only required amount of space
        <p class="ex3">Hello Display Block</p>
    </div>
    
</body>
</html>
