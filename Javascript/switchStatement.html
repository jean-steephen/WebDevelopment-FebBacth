<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Switch - Changing through diffrent case

       //Vending Machine 

       let choice = 8

       switch(choice){
           //Different case

          case 1:
            console.log("Chips")
            break;

          case 2:
            console.log("Chocolate")
            break;

          case 3:
            console.log("Cola")
            break;
           
          case 4:
            console.log("Coffee")  
            break;

          case 5:
            console.log("Dates")  
            break;

          case 6:
            console.log("Biscuit")
            break; 

          case 7:
            console.log("Cake")
            break;

          default:
            console.log("Inavlid Choice")


       }
    </script>
</body>
</html>
