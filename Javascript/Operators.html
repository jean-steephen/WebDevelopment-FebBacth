    <script>
        //1. Arthmetic Operators - + , - , * , / , %- Remainder
        var a = 10
        var b = 7

        console.log(a+b)  //17
        console.log(a-b) //3
        console.log(a/b) //1.somthing
        console.log(a*b) //70
        console.log(a%b) //3
        console.log(1%9)


        //2. Assignment - Assign Value : ""="

        var x = 10 //Value 10 has beein asigned to variable x

        console.log(x+=5)
        console.log(x-=3)
        

        //Comaparsion 
        var p = 25
        var q= 20

        console.log(p>q);  //25 > 20 - true
 
        console.log(p<q);  // 25<20 : false

        console.log(p>=q)
        console.log(p<=q)

        const height1 = "170"
        const height2 = 170

      //  == Only Checks The Value
        console.log(height1 == height2) //True

        // === Checks value and Data type also
        console.log(height1 === height2)


    // Logical Opertors - AND , OR , Negation


    var isMember = true
    let TotalPrice = 300

    //AND - && : Both CONDTION IS TRUE THEN OUTPUT IS TRUE
    console.log(  isMember && TotalPrice > 200 )

   //OR - || : IF ONLY CONDTION IS TRUE THEN ASLO OUTPUT IS TRUE
 console.log(  isMember || TotalPrice > 500 )
